<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff6b00" />
    <meta name="description" content="Santiago Sports Store - متجر الرياضة" />
    <title>Santiago Sports Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { direction: rtl; }
      body {
        background: #0d0d0d;
        font-family: 'Cairo', 'Segoe UI', sans-serif;
        color: #ffffff;
        direction: rtl;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0d0d0d; }
      ::-webkit-scrollbar-thumb { background: #ff6b00; border-radius: 3px; }
      select option { background: #1a1a1a; color: #fff; }
      input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 100px #111 inset !important;
        -webkit-text-fill-color: #fff !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
